# =========================
# CẤU HÌNH CHẠY PIPELINE (v2)
# Lưu ý:
# - base_url & token luôn lấy từ ENV: ONUSLIBS_BASE_URL, ONUSLIBS_ACCESS_CLIENT_TOKEN
# - File này chỉ mô tả endpoint, ngày chạy, filter, fields và limits.
# =========================

[run]
# Khoảng ngày UTC (định dạng ISO); nếu muốn +7 thì tự convert trước khi nhập.
start = "2025-10-10T00:00:00Z"      # ngày bắt đầu
end   = "2025-10-11T23:59:59.999Z" # ngày kết thúc (bao gồm hết ngày)


endpoint = "/api/vndc_commission/accounts/vndc_commission_acc/history"
filters  = "chargedBack=false&transferFilters=vndc_commission_acc.commission_buysell"
fields = [
  "date",
  "transactionNumber",
  "relatedAccount.user.id",
  "relatedAccount.user.display",
  "amount"
]

# endpoint = "api/users"
# filters  = "includeGroup=true&status=active, blocked, disabled"
# fields = [
#   "id",
#   "username",
#   "name",
#   "email"
# ]

# Khi endpoint có tham số datePeriod, để chính xác nên tách theo từng ngày
split_by_day = true

[limits]
# page_size dùng cho mọi request; phải khớp với khả năng API (vd 10000)
page_size = 10000

# RPS tối đa (limiter toàn phiên); tăng nhẹ nếu server cho phép
req_per_sec = 3.0

# Bật HTTP/2 nếu server hỗ trợ
http2 = true

# Timeout cho mỗi request (giây)
timeout_s = 30

# Số luồng chạy SONG SONG theo NGÀY (không song song nội ngày).
# Ví dụ dải 5 ngày có thể set 3 để chạy 3 ngày cùng lúc.
day_workers = 2

# --------- Chiến lược nội ngày (v2) ----------
# Ưu tiên: dùng X-Total-Count để TÍNH K = ceil(total/page_size),
# rồi CHIA NGÀY thành K cửa sổ đều nhau. Mỗi cửa sổ chỉ gọi page=0.
force_segmented_paging = true

# Ngưỡng “đầy” của 1 cửa sổ: nếu len(items) >= ratio*page_size thì coi là tràn,
# cần bisect tiếp cửa sổ đó (vẫn chỉ page=0 cho các nửa).
segment_safety_ratio = 0.95

# Không bisect nếu cửa sổ nhỏ hơn ngưỡng này (giây)
segment_min_seconds = 1

# Bật log chi tiết để kiểm tra header/segment
debug = false

[output]
# Ghi từng đợt vào CSV (true) hay gom về bộ nhớ rồi ghi 1 lần (false)
stream_write = true

# Ghi đè file cũ
overwrite = true     

# Đường dẫn CSV; nếu bỏ trống, runner sẽ tự tạo tên theo endpoint+ngày
csv_path = "files/commission_${start}_${end}.csv"
