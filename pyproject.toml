[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "onuslibs"
version = "0.1.0"
description = "ONUS wallet loader built on dlt"
requires-python = ">=3.10"
dependencies = [
  "dlt>=1.5.0",
  "httpx>=0.27.0",
  "tenacity>=8.2.3",
  "pydantic>=2.7.0",
  "pydantic-settings>=2.2.1",
  "pymysql>=1.1.1"         # MySQL qua SQLAlchemy URI
]

[tool.setuptools.packages.find]
where = ["src"]
