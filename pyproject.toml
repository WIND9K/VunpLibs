[project]
name = "onuslibs"
version = "2.0.0"
description = "OnusLibs v2 clean: time-window pagination (datePeriod page=0) with secure token handling and simple facade."
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27",
    "tenacity>=8.2",
    "pydantic>=2",
    "pydantic-settings>=2",
    "structlog>=24",
    "keyring>=24",
]

[project.optional-dependencies]
db = ["SQLAlchemy>=2", "pymysql>=1"]
csv = ["pandas>=2"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
